<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Sovereign Node | Market Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-accent: #00ff95; 
            --bg-main: #1a1d23; 
            --bg-sidebar: #252932; 
            --panel-bg: #2d323c; 
            --text-primary: #ffffff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg-main); color: var(--text-primary); 
            font-family: 'Inter', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* STATUS BAR - FISSA IN ALTO */
        .node-status-bar {
            background: rgba(0, 255, 149, 0.1);
            border-bottom: 1px solid var(--neon-accent);
            padding: 12px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(5px);
        }

        .pulse-dot {
            display: inline-block; width: 8px; height: 8px;
            background: var(--neon-accent); border-radius: 50%;
            margin-right: 8px; box-shadow: 0 0 10px var(--neon-accent);
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 1; }
            70% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(0.95); opacity: 1; }
        }

        .app-container { display: flex; flex: 1; }

        /* SIDEBAR - DIVENTA HEADER SU MOBILE */
        .sidebar { 
            width: 280px; background: var(--bg-sidebar); border-right: 1px solid rgba(255,255,255,0.05);
            padding: 30px; display: flex; flex-direction: column;
        }

        .logo { font-family: 'Orbitron', sans-serif; color: var(--neon-accent); font-size: 1.4rem; margin-bottom: 20px; }

        .main { flex: 1; padding: 20px; }

        /* RICERCA */
        .search-form { display: flex; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { 
            flex: 1; background: var(--bg-sidebar); border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 8px; color: white; outline: none; font-size: 16px; /* Evita zoom su iPhone */
        }
        
        .btn-search { 
            background: var(--neon-accent); border: none; padding: 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; color: #000;
        }

        /* CARD PRIORITARIA */
        .priority-panel {
            border: 2px solid var(--neon-accent);
            background: linear-gradient(135deg, #2d323c 0%, #1a1d23 100%);
            padding: 20px; border-radius: 12px; margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 149, 0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .panel { background: var(--panel-bg); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }

        .filter-link { 
            display: block; width: 100%; text-align: center;
            margin-top: 15px; background: var(--neon-accent); color: #000; 
            text-decoration: none; font-weight: bold; padding: 12px; border-radius: 6px;
            text-transform: uppercase; font-size: 0.8rem;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; padding: 20px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .main { padding: 15px; overflow: visible; }
            .grid { grid-template-columns: 1fr; }
            .search-form { flex-direction: column; }
            .logo { text-align: center; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div class="node-status-bar">
        <span class="pulse-dot"></span>
        NODE STATUS: <span style="color: var(--neon-accent);">OPERATIONAL</span> 
        | <span id="sync-time">LIVE SYNC</span>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="logo">K-SOVEREIGN</div>
            <p style="color: #a0aec0; font-size: 0.8rem; margin: 0; text-align: center;">Market Intelligence Dashboard</p>
        </div>

        <div class="main">
            <div class="search-form">
                <input type="text" id="searchInput" placeholder="Cerca prodotto...">
                <button type="button" class="btn-search" onclick="executeSearch()">AVVIA SCANSIONE</button>
            </div>

            <div class="priority-panel">
                <h3 style="color: var(--neon-accent); font-family: 'Orbitron', sans-serif; margin: 0 0 10px 0; font-size: 1rem;">⚠️ ALERT ANOMALIA</h3>
                <p style="font-size: 0.9rem; margin-bottom: 15px;">Rilevato crollo prezzi su Hardware e Gaming.</p>
                <a href="/filter?f=hardware" class="filter-link">Vedi Intercettazioni</a>
            </div>

            <div class="grid">
                <div class="panel">
                    <h4 style="margin:0">GAMING RADAR</h4>
                    <a href="/filter?f=gaming" class="filter-link">Accedi</a>
                </div>
                <div class="panel">
                    <h4 style="margin:0">LOW-20 ZONE</h4>
                    <a href="/filter?f=low20" class="filter-link">Accedi</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('sync-time').innerText = "SYNC: " + new Date().toLocaleTimeString();

        // Funzione per gestire i clic e i reindirizzamenti
        async function handleAction(url, fallbackQuery) {
            try {
                // Tenta di contattare il bot (con timeout di 2 secondi)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                
                const response = await fetch(url, { signal: controller.signal });
                const data = await response.json();
                window.location.href = data.url;
            } catch (err) {
                // Se il bot non risponde (normale su GitHub), vai direttamente ad Amazon con il tuo tag
                console.log("Reindirizzamento diretto...");
                const amazonUrl = fallbackQuery 
                    ? `https://www.amazon.it/s?k=${encodeURIComponent(fallbackQuery)}&tag=keygap-21`
                    : `https://www.amazon.it/?tag=keygap-21`;
                window.location.href = amazonUrl;
            }
        }

        function executeSearch() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            handleAction(`/search?q=${encodeURIComponent(q)}`, q);
        }

        document.addEventListener('click', function(e) {
            const link = e.target.closest('.filter-link');
            if (link) {
                e.preventDefault();
                const filterPath = link.getAttribute('href');
                handleAction(filterPath, null);
            }
        });
    </script>
</body>
</html>
