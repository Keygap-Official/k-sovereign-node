<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygap Dashboard V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff95; --bg: #050505; }
        body { 
            margin: 0; background: var(--bg); color: var(--neon); font-family: 'Orbitron', sans-serif; 
            display: flex; height: 100vh; overflow: hidden;
        }
        /* Effetto Scanner Laser */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon); box-shadow: 0 0 15px var(--neon);
            animation: scan 4s linear infinite; z-index: 100; pointer-events: none; opacity: 0.3;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .sidebar { 
            width: 280px; border-right: 1px solid var(--neon); padding: 20px; 
            display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.95);
        }
        .main { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; gap: 30px; overflow-y: auto; }
        
        .header-stats { display: flex; justify-content: space-between; border: 1px solid var(--neon); padding: 15px; background: rgba(0,255,149,0.05); }
        
        .search-area { 
            border: 1px solid var(--neon); padding: 30px; background: rgba(0,255,149,0.02);
            box-shadow: inset 0 0 20px rgba(0,255,149,0.05);
        }
        .search-form { display: flex; gap: 10px; margin-top: 20px; }
        input { flex-grow: 1; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 15px; font-family: inherit; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 15px 30px; font-weight: 900; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { 
            border: 1px solid var(--neon); padding: 20px; text-align: center; 
            text-decoration: none; color: var(--neon); transition: 0.3s; background: rgba(0,0,0,0.5);
        }
        .card:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        
        .btn-side { 
            text-decoration: none; color: var(--neon); border: 1px solid var(--neon); 
            padding: 10px; font-size: 0.8rem; text-align: center; transition: 0.2s;
        }
        .btn-side:hover { background: rgba(0,255,149,0.2); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="font-size: 1.2rem; border-bottom: 2px solid var(--neon); padding-bottom: 10px;">KEYGAP_NODE</h2>
        <div style="font-size: 0.7rem; margin-bottom: 20px;">UPLINK STATUS: <span style="color: #fff;">ENCRYPTED</span></div>
        
        <a href="https://www.amazon.it/gp/bestsellers/?tag=keygap-21" target="_blank" class="btn-side">TOP VENDUTI</a>
        <a href="https://www.amazon.it/gp/new-releases/?tag=keygap-21" target="_blank" class="btn-side">NUOVE USCITE</a>
        <a href="https://www.amazon.it/gp/movers-and-shakers/?tag=keygap-21" target="_blank" class="btn-side">PIÙ DESIDERATI</a>
        
        <div style="margin-top: auto; font-size: 0.6rem; opacity: 0.5;">
            NODE_ID: 676-LGTM<br>
            LOCAL_TIME: <span id="clock">00:00:00</span>
        </div>
    </div>

    <div class="main">
        <div class="header-stats">
            <div>CORE: ACTIVE</div>
            <div>TRAFFIC: TUNNELED</div>
            <div>ID: KEYGAP-21</div>
        </div>

        <div class="search-area">
            <div style="font-size: 0.8rem; opacity: 0.7;">► INIZIALIZZA SCANSIONE MERCATO</div>
            <form action="https://www.amazon.it/s" method="GET" class="search-form" target="_blank">
                <input type="text" name="k" placeholder="CERCA PRODOTTO SUL NETWORK..." required>
                <input type="hidden" name="tag" value="keygap-21">
                <button type="submit">SCANNERIZZA</button>
            </form>
        </div>

        <div class="grid">
            <a href="https://www.amazon.it/s?k=offerte+informatica&tag=keygap-21" target="_blank" class="card"><h3>TECH NODE</h3><p>Hardware & PC</p></a>
            <a href="https://www.amazon.it/s?k=gaming&tag=keygap-21" target="_blank" class="card"><h3>GAMING</h3><p>Console & Gear</p></a>
            <a href="https://www.amazon.it/s?k=domotica&tag=keygap-21" target="_blank" class="card"><h3>DOMOTICA</h3><p>Smart Home</p></a>
            <a href="https://www.amazon.it/s?k=offerte+lampo&tag=keygap-21" target="_blank" class="card"><h3>FLASH</h3><p>Offerte Lampo</p></a>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ':' + 
                now.getMinutes().toString().padStart(2, '0') + ':' + 
                now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
